<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedro Henrique — Algoritmos & Programação</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    /* ───────────────────────────────────────────
        TOKENS
    ─────────────────────────────────────────── */
    :root {
      --bg-deep:    #0D0D0F;
      --bg-card:    #141420;
      --bg-card-h:  #1A1A2E;
      --border:     #252540;
      --border-glow:#00F5FF;
      --cyan:       #00F5FF;
      --cyan-dim:   #00c8d4;
      --purple:     #7B2FBE;
      --purple-dim: #5a2090;
      --text-1:     #E8E8F0;
      --text-2:     #9898B8;
      --text-3:     #5a5a7a;
      --mono:       'JetBrains Mono', monospace;
      --sans:       'Inter', sans-serif;
      --radius:     10px;
      --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }

    /* ───────────────────────────────────────────
        RESET & BASE
    ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-deep);
      color: var(--text-1);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.65;
      min-height: 100vh;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    /* ───────────────────────────────────────────
        SCANLINE OVERLAY
    ───────────────────────────────────────────
